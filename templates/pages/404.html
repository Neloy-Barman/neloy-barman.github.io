{# templates/pages/404.html #} {% extends "base.html" %} {% block content %}

<section class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center max-w-xl">
    <div class="font-mono text-8xl sm:text-9xl font-bold mb-4">
      <span class="gradient-text">404</span>
    </div>
    <div class="font-mono text-cyber-cyan text-sm mb-6 opacity-70">
      ERROR: Page not found in the matrix
    </div>
    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-4">
      Lost in the Latent Space?
    </h1>
    <p class="text-gray-400 mb-8 leading-relaxed">
      The page you're looking for doesn't exist or has been moved. Let's get you
      back on track.
    </p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a
        href="/"
        class="px-8 py-3 rounded-xl bg-gradient-to-r from-cyber-cyan to-cyber-purple text-white font-semibold hover:opacity-90 transition-all"
      >
        <i class="fas fa-home mr-2"></i>Go Home
      </a>
      <a
        href="/contact/"
        class="px-8 py-3 rounded-xl border border-cyber-cyan/50 text-cyber-cyan font-semibold hover:bg-cyber-cyan/10 transition-all"
      >
        <i class="fas fa-envelope mr-2"></i>Contact
      </a>
    </div>
  </div>
</section>

{% endblock %}
