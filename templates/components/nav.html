{# templates/components/nav.html #}
<nav
  class="fixed top-0 left-0 right-0 z-50 nav-glass"
  role="navigation"
  aria-label="Main navigation"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 group" aria-label="Home">
        <div
          class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyber-cyan to-cyber-purple flex items-center justify-center text-white font-mono font-bold text-sm group-hover:scale-110 transition-transform"
        >
          {{ profile.full_name[0] if profile.full_name else 'D' }}
        </div>
        <span
          class="font-mono font-semibold text-white text-sm hidden sm:block"
        >
          {{ config.nav_logo_text }}
        </span>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-1">
        {% for item in nav_items %}
        <a
          href="{{ item.href }}"
          class="nav-link px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 {% if current_page == item.page %}nav-link-active{% endif %}"
          aria-current="{{ 'page' if current_page == item.page else 'false' }}"
        >
          {{ item.label }}
        </a>
        {% endfor %}
        <a
          href="/resume/"
          class="ml-3 px-4 py-2 rounded-lg text-sm font-semibold border border-cyber-cyan text-cyber-cyan hover:bg-cyber-cyan hover:text-dark-base transition-all duration-200"
          aria-label="View Resume"
        >
          Resume
        </a>
      </div>

      <!-- Theme toggle + Mobile menu button -->
      <div class="flex items-center gap-3">
        <button
          id="theme-toggle"
          aria-label="Toggle theme"
          class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-white/10 transition-all"
        >
          <i class="fas fa-sun hidden" id="icon-light"></i>
          <i class="fas fa-moon" id="icon-dark"></i>
        </button>
        <button
          id="mobile-menu-btn"
          aria-label="Open menu"
          aria-expanded="false"
          class="md:hidden p-2 rounded-lg text-gray-400 hover:text-white hover:bg-white/10 transition-all"
        >
          <i class="fas fa-bars" id="menu-icon-open"></i>
          <i class="fas fa-times hidden" id="menu-icon-close"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    id="mobile-menu"
    class="hidden md:hidden border-t border-dark-border bg-dark-base/95 backdrop-blur"
  >
    <div class="px-4 py-3 space-y-1">
      {% for item in nav_items %}
      <a
        href="{{ item.href }}"
        class="block px-3 py-2 rounded-md text-sm font-medium transition-all {% if current_page == item.page %}text-cyber-cyan bg-cyber-cyan/10{% else %}text-gray-300 hover:text-white hover:bg-white/5{% endif %}"
      >
        {{ item.label }}
      </a>
      {% endfor %}
      <a
        href="/resume/"
        class="block mt-2 px-3 py-2 rounded-md text-sm font-semibold text-cyber-cyan border border-cyber-cyan/50 text-center hover:bg-cyber-cyan/10 transition-all"
      >
        Resume
      </a>
    </div>
  </div>
</nav>
